<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#111827" />
  <title>Dany Capture</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="images/icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="app-shell">
    <header class="hero">
      <div>
        <p class="eyebrow">SOS Peinture & Réparation</p>
        <h1>Dany Capture</h1>
        <p class="subtitle">Capture rapide chantier, consommables et notes terrain.</p>
      </div>
      <div class="status-pill" id="connectionStatus">Hors-ligne prêt</div>
    </header>

    <section class="capture-card">
      <button class="big-capture" id="quickCaptureBtn" type="button">+ CAPTURE</button>
      <p class="hint">Exemple : “Sikaflex blanc terminé chez Alban, à commander”.</p>
    </section>

    <section class="form-card" aria-label="Nouvelle capture">
      <label>
        Type
        <select id="captureType">
          <option value="consommable">Consommable</option>
          <option value="materiel">Matériel</option>
          <option value="chantier">Chantier</option>
          <option value="note">Note</option>
        </select>
      </label>

      <label>
        Titre
        <input id="captureTitle" placeholder="Ex : Sikaflex blanc" autocomplete="off" />
      </label>

      <label>
        Détail
        <textarea id="captureNote" rows="3" placeholder="Quantité, chantier, fournisseur, urgence..."></textarea>
      </label>

      <div class="grid-2">
        <label>
          Quantité
          <input id="captureQty" type="number" min="0" step="1" placeholder="1" />
        </label>
        <label>
          Statut
          <select id="captureStatus">
            <option value="a_commander">À commander</option>
            <option value="commande">Commandé</option>
            <option value="recu">Reçu</option>
            <option value="info">Info</option>
          </select>
        </label>
      </div>

      <button class="primary-btn" id="saveCaptureBtn" type="button">Enregistrer</button>
    </section>

    <section class="toolbar">
      <button id="exportBtn" type="button">Exporter CSV</button>
      <button id="clearBtn" type="button">Vider</button>
    </section>

    <section>
      <div class="section-title">
        <h2>Captures</h2>
        <span id="captureCount">0</span>
      </div>
      <div id="captureList" class="capture-list"></div>
    </section>
  </main>

  <template id="captureTemplate">
    <article class="capture-item">
      <div>
        <p class="capture-meta"></p>
        <h3></h3>
        <p class="capture-note"></p>
      </div>
      <span class="badge"></span>
    </article>
  </template>

  <script src="js/db.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
